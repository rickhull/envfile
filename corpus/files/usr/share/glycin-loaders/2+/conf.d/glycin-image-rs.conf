[loader:image/jpeg]
Exec=/usr/lib/glycin-loaders/2+/glycin-image-rs

[editor:image/jpeg]
Exec=/usr/lib/glycin-loaders/2+/glycin-image-rs
Operations=Clip;MirrorHorizontally;MirrorVertically;Rotate
Creator=true
CreatorColorIccProfile=true
CreatorEncodingQuality=true

